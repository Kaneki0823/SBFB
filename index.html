<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MCGG Fate Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎮 MCGG Fate Box Game</h1>

<div id="checkerPanel"></div>

<button onclick="openForm(null)">➕ Add Player</button>

<div id="formContainer"></div>

<h2>Players</h2>
<div id="playersContainer"></div>

<h2>Scoreboard</h2>
<table id="scoreTable"></table>

<h2>Total Pot: <span id="pot">0</span></h2>
<h2>Winner Gets: <span id="winnerPot">0</span></h2>

<button onclick="resetGame()">Reset Game</button>

<script src="script.js"></script>
</body>
</html>
